version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-ctuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ctpass}
      POSTGRES_DB: ${DB_NAME:-contribution_tracker}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ctuser} -d ${DB_NAME:-contribution_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../src
      dockerfile: ../docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${DB_USER:-ctuser}:${DB_PASSWORD:-ctpass}@db:5432/${DB_NAME:-contribution_tracker}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      PORT: "8080"
      GITHUB_BASE_URL: ${GITHUB_BASE_URL:-https://api.github.com}
      GITLAB_BASE_URL: ${GITLAB_BASE_URL:-https://gitlab.cee.redhat.com}
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
